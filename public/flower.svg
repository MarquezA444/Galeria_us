<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="50%" stop-color="#FFB300" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo oscuro optimizado para PWA maskable -->
  <rect width="512" height="512" fill="#0A0708" rx="128"/>

  <g transform="translate(256, 256) scale(2)" filter="url(#neon)">
    <!-- Aura Mágica -->
    <circle r="60" fill="url(#glow)"/>
    
    <!-- Pétalos (Estilo Loto Geométrico) -->
    <!-- Cruz Principal -->
    <path d="M 0 -80 C 20 -40, 20 40, 0 80 C -20 40, -20 -40, 0 -80 Z" fill="#FFD700" opacity="0.9"/>
    <path d="M -80 0 C -40 20, 40 20, 80 0 C 40 -20, -40 -20, -80 0 Z" fill="#FFD700" opacity="0.9"/>
    
    <!-- Cruz Secundaria -->
    <g transform="rotate(45)">
      <path d="M 0 -80 C 20 -40, 20 40, 0 80 C -20 40, -20 -40, 0 -80 Z" fill="#FFC107" opacity="0.8"/>
      <path d="M -80 0 C -40 20, 40 20, 80 0 C 40 -20, -40 -20, -80 0 Z" fill="#FFC107" opacity="0.8"/>
    </g>

    <!-- Cruz Terciaria -->
    <g transform="rotate(22.5)">
      <path d="M 0 -60 C 15 -30, 15 30, 0 60 C -15 30, -15 -30, 0 -60 Z" fill="#FFE082" opacity="0.7"/>
      <path d="M -60 0 C -30 15, 30 15, 60 0 C 30 -15, -30 -15, -60 0 Z" fill="#FFE082" opacity="0.7"/>
    </g>

    <g transform="rotate(67.5)">
      <path d="M 0 -60 C 15 -30, 15 30, 0 60 C -15 30, -15 -30, 0 -60 Z" fill="#FFE082" opacity="0.7"/>
      <path d="M -60 0 C -30 15, 30 15, 60 0 C 30 -15, -30 -15, -60 0 Z" fill="#FFE082" opacity="0.7"/>
    </g>

    <!-- Núcleo de la flor -->
    <circle r="15" fill="#FFF8E1" stroke="#FF8C00" stroke-width="2"/>
    <circle r="5" fill="#FFFFFF"/>
    
    <!-- Chispas Mágicas -->
    <circle cx="-30" cy="-40" r="3" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="40" cy="-20" r="4" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="-20" cy="50" r="2.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="45" cy="35" r="3.5" fill="#FFFFFF" opacity="0.8"/>
  </g>
</svg>
